<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Динамічний список</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Мій список справ</h1>
        
        <div class="controls">
            <input type="text" id="itemInput" placeholder="Введіть новий елемент..." autocomplete="off">
            <button id="addBtn">Додати</button>
            <button id="sortBtn">Сортувати за алфавітом</button>
        </div>

        <ul id="itemList"></ul>
    </div>

    <script src="script.js"></script>
</body>
</html>
